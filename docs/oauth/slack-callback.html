<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axis Slack OAuth Callback</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        width: 100%;
        border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
        border-radius: 12px;
        padding: 20px;
        line-height: 1.5;
      }
      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: color-mix(in srgb, currentColor 10%, transparent);
      }
      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Finishing Slack sign-in...</h1>
      <p>If Axis does not open automatically, click the link below:</p>
      <p><a id="open-axis" href="#">Open Axis Desktop</a></p>
      <p>
        If this keeps failing, confirm that your app is running and your OAuth redirect URI is
        this exact page URL in Slack settings.
      </p>
    </div>

    <script>
      const query = window.location.search || ''
      const deepLink = `axis://oauth/slack${query}`
      const openAxis = document.getElementById('open-axis')

      if (openAxis) {
        openAxis.href = deepLink
      }

      // Try auto-redirect first, keep manual link as fallback.
      window.location.replace(deepLink)
    </script>
  </body>
</html>
